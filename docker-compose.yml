# ══════════════════════════════════════════════════════════════════
# DeepFake Detection – Docker Compose
#
# Servisler:
#   1. rabbitmq      → Mesaj kuyruğu + Yönetim UI
#   2. python-worker → RabbitMQ tüketicisi, analiz motoru
#
# Başlatma:
#   docker-compose up -d --build
#   docker-compose logs -f python-worker
# ══════════════════════════════════════════════════════════════════

services:

  # ── 1. RabbitMQ ───────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: deepfake-rabbitmq
    hostname: rabbitmq          # Durable queue için sabit hostname şart
    ports:
      - "5672:5672"             # AMQP
      - "15672:15672"           # Yönetim UI → http://localhost:15672
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-admin123}
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - deepfake-net

  # ── 2. Python Worker ──────────────────────────────────────────
  python-worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: deepfake-worker:latest
    container_name: deepfake-python-worker
    environment:
      PYTHONUNBUFFERED: "1"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-admin123}
      ANALYSIS_QUEUE: analysis_queue
      RESULT_QUEUE:   result_queue
      WORKER_THREADS: ${WORKER_THREADS:-4}
    env_file:
      - path: .env
        required: false         # .env yoksa hata verme, env var'ları kullan
    depends_on:
      rabbitmq:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    restart: unless-stopped
    networks:
      - deepfake-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── 3. .NET API (hazır olunca yorumu kaldırın) ────────────────
  # dotnet-api:
  #   build:
  #     context: ./DeepFakeApi
  #     dockerfile: Dockerfile
  #   image: deepfake-dotnet-api:latest
  #   container_name: deepfake-dotnet-api
  #   ports:
  #     - "5000:80"
  #   environment:
  #     ASPNETCORE_ENVIRONMENT: Development
  #     ASPNETCORE_URLS: http://+:80
  #     RabbitMQ__Host: rabbitmq
  #     RabbitMQ__Port: "5672"
  #     RabbitMQ__Username: ${RABBITMQ_USER:-admin}
  #     RabbitMQ__Password: ${RABBITMQ_PASS:-admin123}
  #     ConnectionStrings__DefaultConnection: ${DB_CONNECTION}
  #   depends_on:
  #     rabbitmq:
  #       condition: service_healthy
  #   restart: unless-stopped
  #   networks:
  #     - deepfake-net

volumes:
  rabbitmq_data:
    driver: local

networks:
  deepfake-net:
    driver: bridge
